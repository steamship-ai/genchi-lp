<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="サンプル市での新しい暮らしをご紹介します。" />
    <title>暮らしのそばに、サンプル市</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero__image-wrap">
          <img class="hero__image" src="assets/townscape.svg" alt="山と川に囲まれたサンプル市の風景" />
        </div>
        <div class="hero__content">
          <p class="eyebrow">SAMPLE CITY</p>
          <h1 id="hero-title">暮らしのそばに、<br />サンプル市。</h1>
          <p class="hero__lead">山の緑と、川のきらめき。<br />毎日が、ちょうどいいまち。</p>
        </div>
      </section>

      <section class="message" aria-labelledby="message-title">
        <p class="section-label">ABOUT</p>
        <h2 id="message-title">好きな景色のなかで、<br />自分らしく暮らす。</h2>
        <p>朝は鳥の声で目覚め、午後には川辺を歩く。便利さも、自然の近さも、ここにはあります。サンプル市は、あなたらしい日々に寄り添うまちです。</p>
      </section>

      <section class="scenes" aria-label="サンプル市の風景">
        <img src="assets/townscape.svg" alt="水辺のベンチと山並み" />
        <div class="scenes__copy">
          <p class="section-label">EVERYDAY</p>
          <p>季節の移ろいを、<br />いちばん近くで。</p>
        </div>
      </section>

      <section class="closing">
        <p>このまちで、<br />はじめよう。</p>
        <span>SAMPLE CITY</span>
      </section>
    </main>
  </body>
</html>
